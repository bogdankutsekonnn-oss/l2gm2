name: Sync servers from admin DB

on:
  schedule:
    # Каждый час (в :17, чтобы не толкаться с пиковыми крон-слотами GitHub).
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write   # коммит обновлённого servers.json
  actions: write    # запуск deploy.yml через gh workflow run

# Не запускаем параллельные синки.
concurrency:
  group: sync-servers
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync servers.json from DB
        id: sync
        run: |
          set +e
          node scripts/sync-from-db.js
          code=$?
          set -e
          if [ "$code" = "10" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" = "0" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Скрипт синка завершился с ошибкой (код $code)"
            exit "$code"
          fi

      - name: Commit and push
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/servers.json
          git commit -m "Sync: обновление серверов из админ-базы"
          git push

      - name: Trigger deploy
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
