<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>L2GM Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #06080a; color: #f5f5f7; min-height: 100vh; }

    /* Login */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #0f1113; padding: 32px; border-radius: 12px; width: 360px; border: 1px solid rgba(255,255,255,0.06); }
    .login-box h1 { font-size: 20px; margin-bottom: 20px; text-align: center; color: #f5f5f7; }
    .login-box input { width: 100%; padding: 10px 14px; background: #06080a; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: #f5f5f7; font-size: 14px; margin-bottom: 12px; outline: none; }
    .login-box input:focus { border-color: rgb(254, 54, 0); }
    .login-box button { width: 100%; padding: 10px; background: rgb(254, 54, 0); color: #f5f5f7; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .login-box button:hover { background: rgb(179, 30, 0); }

    /* Dashboard */
    .dashboard { display: none; max-width: 1200px; margin: 0 auto; padding: 24px; }
    .dashboard.active { display: block; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .dash-header h1 { font-size: 24px; color: #f5f5f7; }
    .dash-actions { display: flex; gap: 8px; }
    .btn-logout { padding: 8px 16px; background: rgba(255,255,255,0.05); color: rgba(245,245,247,0.6); border: none; border-radius: 8px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
    .btn-logout:hover { background: rgba(255,255,255,0.1); color: #f5f5f7; }
    .btn-add-test { padding: 8px 16px; background: rgb(254, 54, 0); color: #f5f5f7; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.2s; }
    .btn-add-test:hover { background: rgb(179, 30, 0); }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 16px; background: rgba(255,255,255,0.05); border: none; border-radius: 8px; color: rgba(245,245,247,0.6); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .tab:hover { background: rgba(255,255,255,0.1); color: #f5f5f7; }
    .tab.active { background: rgb(254, 54, 0); color: #f5f5f7; }
    .tab .count { margin-left: 4px; opacity: 0.7; }

    /* Table */
    .servers-table { width: 100%; border-collapse: collapse; }
    .servers-table th { text-align: left; padding: 10px 12px; font-size: 11px; color: rgba(245,245,247,0.3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .servers-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; color: rgba(245,245,247,0.8); }
    .servers-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* Status badges */
    .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge-pending { background: rgba(255,193,7,0.1); color: #ffc107; }
    .badge-approved { background: rgba(75,210,133,0.1); color: #4BD285; }
    .badge-rejected { background: rgba(220,53,69,0.1); color: #dc3545; }
    .badge-basic { background: rgba(255,255,255,0.05); color: rgba(245,245,247,0.5); }
    .badge-top { background: rgba(255,255,255,0.08); color: #f5f5f7; }
    .badge-vip { background: rgba(254,54,0,0.1); color: rgb(254, 54, 0); }
    .badge-vip-plus { background: rgba(254,54,0,0.15); color: rgb(254, 80, 30); }
    .badge-premium { background: rgba(224,64,251,0.1); color: #e040fb; }

    /* Action buttons */
    .actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .btn-action { padding: 4px 10px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
    .btn-approve { background: rgba(75,210,133,0.15); color: #4BD285; }
    .btn-approve:hover { background: rgba(75,210,133,0.25); }
    .btn-reject { background: rgba(220,53,69,0.15); color: #dc3545; }
    .btn-reject:hover { background: rgba(220,53,69,0.25); }
    .btn-edit { background: rgba(254,54,0,0.15); color: rgb(254, 54, 0); }
    .btn-edit:hover { background: rgba(254,54,0,0.25); }
    .btn-delete { background: rgba(220,53,69,0.08); color: rgba(220,53,69,0.5); }
    .btn-delete:hover { background: rgba(220,53,69,0.15); color: #dc3545; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #0f1113; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 24px; width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal h2 { font-size: 18px; margin-bottom: 16px; color: #f5f5f7; }
    .modal label { display: block; font-size: 12px; color: rgba(245,245,247,0.5); margin-bottom: 4px; margin-top: 12px; }
    .modal input, .modal select { width: 100%; padding: 8px 12px; background: #06080a; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #f5f5f7; font-size: 13px; outline: none; }
    .modal input:focus, .modal select:focus { border-color: rgb(254, 54, 0); }
    .modal select { color-scheme: dark; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .modal-actions button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-save { background: rgb(254, 54, 0); color: #f5f5f7; }
    .btn-save:hover { background: rgb(179, 30, 0); }
    .btn-cancel { background: rgba(255,255,255,0.05); color: rgba(245,245,247,0.6); }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); }

    .empty { text-align: center; padding: 48px; color: rgba(245,245,247,0.3); }
    .server-link { color: rgb(254, 54, 0); text-decoration: none; }
    .server-link:hover { text-decoration: underline; }
    .contacts-cell { font-size: 12px; color: rgba(245,245,247,0.5); line-height: 1.4; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>L2GM Admin</h1>
    <input type="password" id="tokenInput" placeholder="Admin token" autofocus>
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <h1>L2GM Admin Panel</h1>
    <div class="dash-actions">
      <button class="btn-add-test" onclick="addTestServer()">+ Тестовая заявка</button>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-status="pending" onclick="switchTab('pending')">На модерации <span class="count" id="countPending">0</span></button>
    <button class="tab" data-status="approved" onclick="switchTab('approved')">Опубликованы <span class="count" id="countApproved">0</span></button>
    <button class="tab" data-status="rejected" onclick="switchTab('rejected')">Отклонены <span class="count" id="countRejected">0</span></button>
  </div>

  <table class="servers-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Название</th>
        <th>Хроника</th>
        <th>Рейт</th>
        <th>Старт</th>
        <th>Тариф</th>
        <th>Статус</th>
        <th>Контакты</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="serversBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none">Нет серверов</div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Редактирование сервера</h2>
    <input type="hidden" id="editId">

    <label>Название</label>
    <input type="text" id="editName">

    <label>URL</label>
    <input type="url" id="editUrl">

    <label>Хроника</label>
    <input type="text" id="editChronicle">

    <label>Рейт</label>
    <input type="number" id="editRate">

    <label>Дата старта</label>
    <input type="date" id="editStartDate">

    <label>Тип карточки</label>
    <select id="editCardType">
      <option value="basic">Обычная</option>
      <option value="top">Стандартный VIP</option>
      <option value="vip">VIP</option>
      <option value="vip-plus">VIP+</option>
      <option value="premium">Premium</option>
    </select>

    <label>Дата истечения (платное)</label>
    <input type="date" id="editExpiresAt">

    <label>Email</label>
    <input type="email" id="editEmail">

    <label>Контакты</label>
    <input type="text" id="editContacts">

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api';
let token = localStorage.getItem('admin_token') || '';
let allServers = [];
let currentTab = 'pending';

// Auto-login if token saved
if (token) {
  tryLogin(token);
}

function login() {
  const input = document.getElementById('tokenInput').value.trim();
  if (!input) return;
  tryLogin(input);
}

async function tryLogin(t) {
  try {
    const res = await fetch(`${API_BASE}/servers.php?all=1&token=${encodeURIComponent(t)}`, {
      headers: { 'Authorization': `Bearer ${t}` }
    });
    if (res.ok) {
      token = t;
      localStorage.setItem('admin_token', t);
      allServers = await res.json();
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      updateCounts();
      renderServers();
    } else {
      alert('Неверный токен');
      localStorage.removeItem('admin_token');
    }
  } catch (e) {
    alert('Ошибка подключения к API');
  }
}

function logout() {
  token = '';
  localStorage.removeItem('admin_token');
  location.reload();
}

function switchTab(status) {
  currentTab = status;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.status === status));
  renderServers();
}

function updateCounts() {
  document.getElementById('countPending').textContent = allServers.filter(s => s.status === 'pending').length;
  document.getElementById('countApproved').textContent = allServers.filter(s => s.status === 'approved').length;
  document.getElementById('countRejected').textContent = allServers.filter(s => s.status === 'rejected').length;
}

function renderServers() {
  const filtered = allServers.filter(s => s.status === currentTab);
  const tbody = document.getElementById('serversBody');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(s => `
    <tr>
      <td>${s.id}</td>
      <td><a class="server-link" href="${s.url}" target="_blank">${s.name}</a></td>
      <td>${s.chronicle}</td>
      <td>${s.rate !== null ? 'x' + s.rate : (s.category || '—')}</td>
      <td>${s.startDate}</td>
      <td><span class="badge badge-${s.cardType}">${s.cardType}</span></td>
      <td><span class="badge badge-${s.status}">${s.status}</span></td>
      <td class="contacts-cell">${s.email || ''}${s.contacts ? '<br>' + s.contacts : ''}</td>
      <td>
        <div class="actions">
          ${s.status === 'pending' ? `
            <button class="btn-action btn-approve" onclick="approveServer(${s.id})">OK</button>
            <button class="btn-action btn-reject" onclick="rejectServer(${s.id})">X</button>
          ` : ''}
          ${s.status === 'rejected' ? `
            <button class="btn-action btn-approve" onclick="approveServer(${s.id})">OK</button>
          ` : ''}
          <button class="btn-action btn-edit" onclick="openEdit(${s.id})">Edit</button>
          <button class="btn-action btn-delete" onclick="deleteServer(${s.id})">Del</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function apiAction(action, id, method = 'POST', body = null) {
  const opts = {
    method,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(`${API_BASE}/admin.php?action=${action}&id=${id}&token=${encodeURIComponent(token)}`, opts);
  return res.json();
}

async function approveServer(id) {
  await apiAction('approve', id);
  const s = allServers.find(s => s.id === id);
  if (s) s.status = 'approved';
  updateCounts();
  renderServers();
}

async function rejectServer(id) {
  await apiAction('reject', id);
  const s = allServers.find(s => s.id === id);
  if (s) s.status = 'rejected';
  updateCounts();
  renderServers();
}

async function deleteServer(id) {
  if (!confirm('Удалить сервер #' + id + '?')) return;
  await apiAction('delete', id, 'DELETE');
  allServers = allServers.filter(s => s.id !== id);
  updateCounts();
  renderServers();
}

// Тестовая заявка
async function addTestServer() {
  const testData = {
    name: 'TEST-SERVER',
    url: 'https://test-server.com',
    chronicle: 'Interlude',
    rate: 100,
    category: null,
    startDate: new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0],
    cardType: 'basic',
    icons: [],
    serverTypes: ['pvp'],
    email: 'test@test.com',
    contacts: '@test_admin',
    expiresAt: null,
  };

  try {
    const res = await fetch(`${API_BASE}/servers.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(testData),
    });
    const result = await res.json();

    if (result.success) {
      // Добавляем в локальный список
      testData.id = result.id;
      testData.status = 'pending';
      testData.createdAt = new Date().toISOString();
      allServers.unshift(testData);
      switchTab('pending');
      updateCounts();
      renderServers();
    } else {
      alert('Ошибка: ' + (result.error || 'Unknown'));
    }
  } catch (e) {
    alert('Ошибка подключения к API');
  }
}

function openEdit(id) {
  const s = allServers.find(s => s.id === id);
  if (!s) return;
  document.getElementById('editId').value = s.id;
  document.getElementById('editName').value = s.name;
  document.getElementById('editUrl').value = s.url;
  document.getElementById('editChronicle').value = s.chronicle;
  document.getElementById('editRate').value = s.rate ?? '';
  document.getElementById('editStartDate').value = s.startDate;
  document.getElementById('editCardType').value = s.cardType;
  document.getElementById('editExpiresAt').value = s.expiresAt || '';
  document.getElementById('editEmail').value = s.email || '';
  document.getElementById('editContacts').value = s.contacts || '';
  document.getElementById('editModal').classList.add('active');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('active');
}

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const data = {
    name: document.getElementById('editName').value,
    url: document.getElementById('editUrl').value,
    chronicle: document.getElementById('editChronicle').value,
    rate: document.getElementById('editRate').value ? parseInt(document.getElementById('editRate').value) : null,
    startDate: document.getElementById('editStartDate').value,
    cardType: document.getElementById('editCardType').value,
    expiresAt: document.getElementById('editExpiresAt').value || null,
    email: document.getElementById('editEmail').value,
    contacts: document.getElementById('editContacts').value,
  };

  await apiAction('update', id, 'PUT', data);

  // Обновляем локально
  const s = allServers.find(s => s.id === parseInt(id));
  if (s) Object.assign(s, data);

  closeModal();
  renderServers();
}

// Enter key on login
document.getElementById('tokenInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
