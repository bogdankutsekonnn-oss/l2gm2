<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>L2GM Admin</title>
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #06080a; color: #f5f5f7; min-height: 100vh; }

    /* Login */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #0f1113; padding: 32px; border-radius: 12px; width: 360px; border: 1px solid rgba(255,255,255,0.06); }
    .login-box h1 { font-size: 20px; margin-bottom: 20px; text-align: center; color: #f5f5f7; }
    .login-box input { width: 100%; padding: 10px 14px; background: #06080a; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: #f5f5f7; font-size: 14px; margin-bottom: 12px; outline: none; }
    .login-box input:focus { border-color: rgb(254, 54, 0); }
    .login-box button { width: 100%; padding: 10px; background: rgb(254, 54, 0); color: #f5f5f7; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .login-box button:hover { background: rgb(179, 30, 0); }
    .login-sep { margin: 14px 0 10px; text-align: center; font-size: 11px; color: rgba(245,245,247,0.3); text-transform: uppercase; letter-spacing: 0.5px; }
    .login-error { margin-top: 10px; font-size: 12px; color: #dc3545; text-align: center; min-height: 14px; }

    /* Sync */
    .btn-sync { padding: 8px 16px; background: rgba(75,210,133,0.15); color: #4BD285; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.2s; }
    .btn-sync:hover { background: rgba(75,210,133,0.25); }
    .btn-sync:disabled { opacity: 0.5; cursor: default; }
    .sync-status { font-size: 12px; color: rgba(245,245,247,0.5); margin: -12px 0 16px; min-height: 16px; }
    .sync-status a { color: inherit; }

    /* Dashboard */
    .dashboard { display: none; max-width: 1200px; margin: 0 auto; padding: 24px; }
    .dashboard.active { display: block; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .dash-header h1 { font-size: 24px; color: #f5f5f7; }
    .dash-actions { display: flex; gap: 8px; }
    .btn-logout { padding: 8px 16px; background: rgba(255,255,255,0.05); color: rgba(245,245,247,0.6); border: none; border-radius: 8px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
    .btn-logout:hover { background: rgba(255,255,255,0.1); color: #f5f5f7; }
    .btn-add-test { padding: 8px 16px; background: rgb(254, 54, 0); color: #f5f5f7; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.2s; }
    .btn-add-test:hover { background: rgb(179, 30, 0); }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 16px; background: rgba(255,255,255,0.05); border: none; border-radius: 8px; color: rgba(245,245,247,0.6); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .tab:hover { background: rgba(255,255,255,0.1); color: #f5f5f7; }
    .tab.active { background: rgb(254, 54, 0); color: #f5f5f7; }
    .tab .count { margin-left: 4px; opacity: 0.7; }

    /* Table */
    .servers-table { width: 100%; border-collapse: collapse; }
    .servers-table th { text-align: left; padding: 10px 12px; font-size: 11px; color: rgba(245,245,247,0.3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .servers-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; color: rgba(245,245,247,0.8); }
    .servers-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* Status badges */
    .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge-pending { background: rgba(255,193,7,0.1); color: #ffc107; }
    .badge-approved { background: rgba(75,210,133,0.1); color: #4BD285; }
    .badge-rejected { background: rgba(220,53,69,0.1); color: #dc3545; }
    .badge-basic { background: rgba(255,255,255,0.05); color: rgba(245,245,247,0.5); }
    .badge-top { background: rgba(255,255,255,0.08); color: #f5f5f7; }
    .badge-vip { background: rgba(254,54,0,0.1); color: rgb(254, 54, 0); }
    .badge-vip-plus { background: rgba(254,54,0,0.15); color: rgb(254, 80, 30); }
    .badge-premium { background: rgba(224,64,251,0.1); color: #e040fb; }

    /* Action buttons */
    .actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .btn-action { padding: 4px 10px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
    .btn-approve { background: rgba(75,210,133,0.15); color: #4BD285; }
    .btn-approve:hover { background: rgba(75,210,133,0.25); }
    .btn-reject { background: rgba(220,53,69,0.15); color: #dc3545; }
    .btn-reject:hover { background: rgba(220,53,69,0.25); }
    .btn-edit { background: rgba(254,54,0,0.15); color: rgb(254, 54, 0); }
    .btn-edit:hover { background: rgba(254,54,0,0.25); }
    .btn-delete { background: rgba(220,53,69,0.08); color: rgba(220,53,69,0.5); }
    .btn-delete:hover { background: rgba(220,53,69,0.15); color: #dc3545; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #0f1113; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 24px; width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal h2 { font-size: 18px; margin-bottom: 16px; color: #f5f5f7; }
    .modal label { display: block; font-size: 12px; color: rgba(245,245,247,0.5); margin-bottom: 4px; margin-top: 12px; }
    .modal input, .modal select, .modal textarea { width: 100%; padding: 8px 12px; background: #06080a; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #f5f5f7; font-size: 13px; outline: none; }
    .modal textarea { min-height: 70px; resize: vertical; font-family: inherit; }
    .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: rgb(254, 54, 0); }
    .modal select { color-scheme: dark; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .modal-actions button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-save { background: rgb(254, 54, 0); color: #f5f5f7; }
    .btn-save:hover { background: rgb(179, 30, 0); }
    .btn-cancel { background: rgba(255,255,255,0.05); color: rgba(245,245,247,0.6); }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); }

    .empty { text-align: center; padding: 48px; color: rgba(245,245,247,0.3); }
    .server-link { color: rgb(254, 54, 0); text-decoration: none; }
    .server-link:hover { text-decoration: underline; }
    .contacts-cell { font-size: 12px; color: rgba(245,245,247,0.5); line-height: 1.4; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>L2GM Admin</h1>
    <input type="text" id="loginUser" placeholder="Логин" autofocus autocomplete="username">
    <input type="password" id="loginPass" placeholder="Пароль" autocomplete="current-password">
    <div class="login-sep">или</div>
    <input type="password" id="tokenInput" placeholder="Мастер-токен">
    <button onclick="login()">Войти</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <h1>L2GM Admin Panel</h1>
    <div class="dash-actions">
      <button class="btn-sync" id="syncBtn" onclick="runSync()">Синк с сайтом</button>
      <button class="btn-add-test" onclick="openAdd()">+ Добавить сервер</button>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="sync-status" id="syncStatus"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-status="pending" onclick="switchTab('pending')">На модерации <span class="count" id="countPending">0</span></button>
    <button class="tab" data-status="approved" onclick="switchTab('approved')">Опубликованы <span class="count" id="countApproved">0</span></button>
    <button class="tab" data-status="rejected" onclick="switchTab('rejected')">Отклонены <span class="count" id="countRejected">0</span></button>
    <button class="tab" data-status="stats" onclick="switchTab('stats')">Статистика кликов</button>
  </div>

  <!-- Серверы -->
  <div id="serversSection">
    <table class="servers-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Название</th>
          <th>Хроника</th>
          <th>Рейт</th>
          <th>Старт</th>
          <th>Тариф</th>
          <th>Статус</th>
          <th>Контакты</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="serversBody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">Нет серверов</div>
  </div>

  <!-- Статистика кликов -->
  <div id="statsSection" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-size:13px;color:rgba(245,245,247,0.5);" id="statsSummary"></div>
      <button class="btn-add-test" onclick="loadStats()" style="font-size:12px;padding:6px 12px;">Обновить</button>
    </div>
    <table class="servers-table">
      <thead>
        <tr>
          <th>Название</th>
          <th>URL</th>
          <th>Хроника</th>
          <th>Рейт</th>
          <th>В базе</th>
          <th>Всего кликов</th>
          <th>Уникальных</th>
          <th>Последний клик</th>
        </tr>
      </thead>
      <tbody id="statsBody"></tbody>
    </table>
    <div class="empty" id="statsEmpty" style="display:none">Нет данных</div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Добавить сервер</h2>

    <label>Название *</label>
    <input type="text" id="addName" placeholder="L2 Example">

    <label>URL *</label>
    <input type="url" id="addUrl" placeholder="https://example.com">

    <label>Хроника *</label>
    <input type="text" id="addChronicle" placeholder="Interlude / High Five / Essence ...">

    <label>Рейт (число, опционально)</label>
    <input type="number" id="addRate" placeholder="100">

    <label>Категория (если без рейта)</label>
    <input type="text" id="addCategory" placeholder="LowRate / MidRate / HighRate">

    <label>Дата старта *</label>
    <input type="date" id="addStartDate">

    <label>Тип карточки</label>
    <select id="addCardType">
      <option value="basic">Обычная</option>
      <option value="top">Стандартный VIP</option>
      <option value="vip">VIP</option>
      <option value="vip-plus">VIP+</option>
      <option value="premium">Premium</option>
    </select>

    <label>Дата истечения (для платных)</label>
    <input type="date" id="addExpiresAt">

    <label>Типы сервера (через запятую: pvp, craft, x100 ...)</label>
    <input type="text" id="addServerTypes" placeholder="pvp, craft">

    <label>Иконки (через запятую, опционально)</label>
    <input type="text" id="addIcons" placeholder="">

    <label>Описание (опционально)</label>
    <textarea id="addDescription" placeholder="Короткое описание сервера"></textarea>

    <label>URL аватарки (опционально)</label>
    <input type="url" id="addAvatarUrl" placeholder="https://...">

    <label>Email</label>
    <input type="email" id="addEmail">

    <label>Контакты (Telegram / Discord)</label>
    <input type="text" id="addContacts" placeholder="@admin">

    <label>Статус публикации</label>
    <select id="addStatus">
      <option value="approved">Опубликовать сразу</option>
      <option value="pending">На модерацию</option>
    </select>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Отмена</button>
      <button class="btn-save" onclick="saveAdd()">Создать</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Редактирование сервера</h2>
    <input type="hidden" id="editId">

    <label>Название</label>
    <input type="text" id="editName">

    <label>URL</label>
    <input type="url" id="editUrl">

    <label>Хроника</label>
    <input type="text" id="editChronicle">

    <label>Рейт</label>
    <input type="number" id="editRate">

    <label>Категория (если без рейта: gve, rvr ...)</label>
    <input type="text" id="editCategory">

    <label>Дата старта</label>
    <input type="date" id="editStartDate">

    <label>Тип карточки</label>
    <select id="editCardType">
      <option value="basic">Обычная</option>
      <option value="top">Стандартный VIP</option>
      <option value="vip">VIP</option>
      <option value="vip-plus">VIP+</option>
      <option value="premium">Premium</option>
    </select>

    <label>Статус</label>
    <select id="editStatus">
      <option value="approved">Опубликован</option>
      <option value="pending">На модерации</option>
      <option value="rejected">Отклонён</option>
    </select>

    <label>Дата истечения (платное)</label>
    <input type="date" id="editExpiresAt">

    <label>Типы сервера (через запятую: pvp, craft ...)</label>
    <input type="text" id="editServerTypes">

    <label>Иконки (через запятую: hot-start, recommended ...)</label>
    <input type="text" id="editIcons">

    <label>Описание</label>
    <textarea id="editDescription"></textarea>

    <label>URL аватарки</label>
    <input type="url" id="editAvatarUrl">

    <label>Email</label>
    <input type="email" id="editEmail">

    <label>Контакты</label>
    <input type="text" id="editContacts">

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api';
let token = localStorage.getItem('admin_token') || '';
let allServers = [];
let currentTab = 'pending';

// Токен передаётся ТОЛЬКО в заголовке Authorization — query string оседает
// в access-логах хостинга.
function authHeaders(extra = {}) {
  return { 'Authorization': `Bearer ${token}`, ...extra };
}

// Экранирование для innerHTML: данные заявок приходят из публичной формы
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function loginError(msg) {
  document.getElementById('loginError').textContent = msg || '';
}

// Auto-login if token saved
if (token) {
  tryLogin(token);
}

async function login() {
  loginError('');
  const masterToken = document.getElementById('tokenInput').value.trim();
  if (masterToken) {
    tryLogin(masterToken);
    return;
  }

  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username || !password) {
    loginError('Введите логин и пароль (или мастер-токен)');
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/auth.php?action=login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok || !data.token) {
      loginError(data.error === 'Invalid credentials' ? 'Неверный логин или пароль' : (data.error || 'Ошибка входа'));
      return;
    }
    tryLogin(data.token);
  } catch (e) {
    loginError('Ошибка подключения к API');
  }
}

async function tryLogin(t) {
  try {
    const res = await fetch(`${API_BASE}/servers.php?all=1`, {
      headers: { 'Authorization': `Bearer ${t}` }
    });
    if (res.ok) {
      token = t;
      localStorage.setItem('admin_token', t);
      allServers = await res.json();
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      updateCounts();
      renderServers();
      loadSyncStatus();
    } else {
      loginError('Сессия недействительна, войдите заново');
      localStorage.removeItem('admin_token');
    }
  } catch (e) {
    loginError('Ошибка подключения к API');
  }
}

function logout() {
  // Гасим серверную сессию (для мастер-токена — no-op)
  fetch(`${API_BASE}/auth.php?action=logout`, { method: 'POST', headers: authHeaders() }).catch(() => {});
  token = '';
  localStorage.removeItem('admin_token');
  location.reload();
}

function switchTab(status) {
  currentTab = status;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.status === status));

  if (status === 'stats') {
    document.getElementById('serversSection').style.display = 'none';
    document.getElementById('statsSection').style.display = 'block';
    loadStats();
  } else {
    document.getElementById('serversSection').style.display = 'block';
    document.getElementById('statsSection').style.display = 'none';
    renderServers();
  }
}

function updateCounts() {
  document.getElementById('countPending').textContent = allServers.filter(s => s.status === 'pending').length;
  document.getElementById('countApproved').textContent = allServers.filter(s => s.status === 'approved').length;
  document.getElementById('countRejected').textContent = allServers.filter(s => s.status === 'rejected').length;
}

function renderServers() {
  const filtered = allServers.filter(s => s.status === currentTab);
  const tbody = document.getElementById('serversBody');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(s => `
    <tr>
      <td>${s.id}</td>
      <td><a class="server-link" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">${esc(s.name)}</a></td>
      <td>${esc(s.chronicle)}</td>
      <td>${s.rate !== null ? 'x' + esc(s.rate) : esc(s.category || '—')}</td>
      <td>${esc(s.startDate)}</td>
      <td><span class="badge badge-${esc(s.cardType)}">${esc(s.cardType)}</span></td>
      <td><span class="badge badge-${esc(s.status)}">${esc(s.status)}</span></td>
      <td class="contacts-cell">${esc(s.email || '')}${s.contacts ? '<br>' + esc(s.contacts) : ''}</td>
      <td>
        <div class="actions">
          ${s.status === 'pending' ? `
            <button class="btn-action btn-approve" onclick="approveServer(${s.id})">OK</button>
            <button class="btn-action btn-reject" onclick="rejectServer(${s.id})">X</button>
          ` : ''}
          ${s.status === 'rejected' ? `
            <button class="btn-action btn-approve" onclick="approveServer(${s.id})">OK</button>
          ` : ''}
          <button class="btn-action btn-edit" onclick="openEdit(${s.id})">Edit</button>
          <button class="btn-action btn-delete" onclick="deleteServer(${s.id})">Del</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function apiAction(action, id, method = 'POST', body = null) {
  const opts = {
    method,
    headers: authHeaders({ 'Content-Type': 'application/json' })
  };
  if (body) opts.body = JSON.stringify(body);

  const url = `${API_BASE}/admin.php?action=${action}&id=${id}`;
  const res = await fetch(url, opts);
  const text = await res.text();
  let result;
  try { result = JSON.parse(text); }
  catch (e) {
    console.error(`[apiAction ${action}] non-JSON response (${res.status}):`, text);
    throw new Error(`HTTP ${res.status}: ${text.slice(0, 200)}`);
  }
  if (!res.ok || result.error) {
    console.error(`[apiAction ${action}] error:`, result);
    throw new Error(result.error || `HTTP ${res.status}`);
  }
  return result;
}

async function approveServer(id) {
  await apiAction('approve', id);
  const s = allServers.find(s => s.id === id);
  if (s) s.status = 'approved';
  updateCounts();
  renderServers();
}

async function rejectServer(id) {
  await apiAction('reject', id);
  const s = allServers.find(s => s.id === id);
  if (s) s.status = 'rejected';
  updateCounts();
  renderServers();
}

async function deleteServer(id) {
  if (!confirm('Удалить сервер #' + id + '?')) return;
  await apiAction('delete', id, 'DELETE');
  allServers = allServers.filter(s => s.id !== id);
  updateCounts();
  renderServers();
}

function openAdd() {
  document.getElementById('addName').value = '';
  document.getElementById('addUrl').value = '';
  document.getElementById('addChronicle').value = '';
  document.getElementById('addRate').value = '';
  document.getElementById('addCategory').value = '';
  document.getElementById('addStartDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('addCardType').value = 'basic';
  document.getElementById('addExpiresAt').value = '';
  document.getElementById('addServerTypes').value = '';
  document.getElementById('addIcons').value = '';
  document.getElementById('addDescription').value = '';
  document.getElementById('addAvatarUrl').value = '';
  document.getElementById('addEmail').value = '';
  document.getElementById('addContacts').value = '';
  document.getElementById('addStatus').value = 'approved';
  document.getElementById('addModal').classList.add('active');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

function parseList(s) {
  return (s || '').split(',').map(x => x.trim()).filter(Boolean);
}

async function saveAdd() {
  const name = document.getElementById('addName').value.trim();
  const url = document.getElementById('addUrl').value.trim();
  const chronicle = document.getElementById('addChronicle').value.trim();
  const startDate = document.getElementById('addStartDate').value;

  if (!name || !url || !chronicle || !startDate) {
    alert('Заполните обязательные поля: Название, URL, Хроника, Дата старта');
    return;
  }

  const rateRaw = document.getElementById('addRate').value;
  const data = {
    name,
    url,
    chronicle,
    rate: rateRaw ? parseInt(rateRaw) : null,
    category: document.getElementById('addCategory').value.trim() || null,
    startDate,
    cardType: document.getElementById('addCardType').value,
    icons: parseList(document.getElementById('addIcons').value),
    serverTypes: parseList(document.getElementById('addServerTypes').value),
    description: document.getElementById('addDescription').value.trim() || null,
    avatarUrl: document.getElementById('addAvatarUrl').value.trim() || null,
    email: document.getElementById('addEmail').value.trim() || null,
    contacts: document.getElementById('addContacts').value.trim() || null,
    expiresAt: document.getElementById('addExpiresAt').value || null,
  };

  const desiredStatus = document.getElementById('addStatus').value;

  console.log('[saveAdd] POST payload:', data);

  let res, text, result;
  try {
    res = await fetch(`${API_BASE}/servers.php`, {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(data),
    });
    text = await res.text();
    console.log(`[saveAdd] response ${res.status}:`, text);
  } catch (e) {
    console.error('[saveAdd] fetch failed:', e);
    alert('Сеть/CORS: ' + e.message);
    return;
  }

  try { result = JSON.parse(text); }
  catch (e) {
    alert(`Сервер вернул не-JSON (HTTP ${res.status}):\n` + text.slice(0, 400));
    return;
  }

  if (!res.ok || !result.success) {
    alert(`Ошибка при создании (HTTP ${res.status}):\n` + (result.error || JSON.stringify(result)));
    return;
  }

  // Сервер создан со статусом pending. Если нужно сразу опубликовать — апрувим.
  if (desiredStatus === 'approved') {
    try {
      await apiAction('approve', result.id);
    } catch (e) {
      alert(`Сервер #${result.id} создан, но approve упал:\n` + e.message);
      // не выходим — пусть хотя бы в pending покажется
    }
  }

  // Добавляем в локальный список
  const local = {
    ...data,
    id: result.id,
    status: desiredStatus,
    createdAt: new Date().toISOString(),
  };
  allServers.unshift(local);

  closeAddModal();
  switchTab(desiredStatus);
  updateCounts();
  renderServers();
}

function openEdit(id) {
  const s = allServers.find(s => s.id === id);
  if (!s) return;
  document.getElementById('editId').value = s.id;
  document.getElementById('editName').value = s.name;
  document.getElementById('editUrl').value = s.url;
  document.getElementById('editChronicle').value = s.chronicle;
  document.getElementById('editRate').value = s.rate ?? '';
  document.getElementById('editCategory').value = s.category || '';
  document.getElementById('editStartDate').value = s.startDate;
  document.getElementById('editCardType').value = s.cardType;
  document.getElementById('editStatus').value = s.status;
  document.getElementById('editExpiresAt').value = s.expiresAt || '';
  document.getElementById('editServerTypes').value = (s.serverTypes || []).join(', ');
  document.getElementById('editIcons').value = (s.icons || []).join(', ');
  document.getElementById('editDescription').value = s.description || '';
  document.getElementById('editAvatarUrl').value = s.avatarUrl || '';
  document.getElementById('editEmail').value = s.email || '';
  document.getElementById('editContacts').value = s.contacts || '';
  document.getElementById('editModal').classList.add('active');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('active');
}

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const data = {
    name: document.getElementById('editName').value,
    url: document.getElementById('editUrl').value,
    chronicle: document.getElementById('editChronicle').value,
    rate: document.getElementById('editRate').value ? parseInt(document.getElementById('editRate').value) : null,
    category: document.getElementById('editCategory').value.trim() || null,
    startDate: document.getElementById('editStartDate').value,
    cardType: document.getElementById('editCardType').value,
    status: document.getElementById('editStatus').value,
    expiresAt: document.getElementById('editExpiresAt').value || null,
    serverTypes: parseList(document.getElementById('editServerTypes').value),
    icons: parseList(document.getElementById('editIcons').value),
    description: document.getElementById('editDescription').value.trim() || null,
    avatarUrl: document.getElementById('editAvatarUrl').value.trim() || null,
    email: document.getElementById('editEmail').value,

  };

  await apiAction('update', id, 'PUT', data);

  renderServers();
}

// === Статистика кликов ===
// Агрегация по server_key "url|хроника|рейт" — в статистику попадают и
// скрейпленные сервера, которых нет в админ-базе (колонка «В базе»).
async function loadStats() {
  try {
    const res = await fetch(`${API_BASE}/out.php?all_stats=1`, {
      headers: authHeaders()
    });
    const data = await res.json();
    renderStats(data);
  } catch (e) {
    document.getElementById('statsBody').innerHTML = '';
    document.getElementById('statsEmpty').style.display = 'block';
  }
}

function renderStats(stats) {
  const tbody = document.getElementById('statsBody');
  const empty = document.getElementById('statsEmpty');
  const summary = document.getElementById('statsSummary');

  if (!stats || stats.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    summary.textContent = '';
    return;
  }
  empty.style.display = 'none';

  const totalClicks = stats.reduce((sum, s) => sum + parseInt(s.total_clicks || 0), 0);
  const totalUnique = stats.reduce((sum, s) => sum + parseInt(s.unique_clicks || 0), 0);
  summary.textContent = `Всего: ${totalClicks} кликов, ${totalUnique} уникальных`;

  tbody.innerHTML = stats.map(s => {
    // server_key = "нормализованный-url|хроника|рейт-или-категория"
    const [keyUrl = '', chronicle = '', rateOrCat = ''] = String(s.server_key || '').split('|');
    const rate = /^\d+$/.test(rateOrCat) ? 'x' + rateOrCat : (rateOrCat === 'null' ? '—' : rateOrCat.toUpperCase());
    const lastClick = s.last_click ? new Date(s.last_click).toLocaleString('ru-RU') : '—';
    const clicks = parseInt(s.total_clicks || 0);
    const unique = parseInt(s.unique_clicks || 0);
    const clicksColor = clicks > 0 ? '#4BD285' : 'rgba(245,245,247,0.3)';
    const inDb = s.server_id
      ? `<span class="badge badge-approved">#${esc(s.server_id)}</span>`
      : '<span class="badge badge-basic">скрейп</span>';

    return `
      <tr>
        <td><strong style="color:#f5f5f7">${esc(s.name || keyUrl)}</strong></td>
        <td><a class="server-link" href="https://${esc(keyUrl)}" target="_blank" rel="noopener noreferrer">${esc(keyUrl)}</a></td>
        <td>${esc(chronicle)}</td>
        <td>${esc(rate)}</td>
        <td>${inDb}</td>
        <td style="color:${clicksColor};font-weight:600">${clicks}</td>
        <td style="color:${clicksColor}">${unique}</td>
        <td style="font-size:12px;color:rgba(245,245,247,0.5)">${lastClick}</td>
      </tr>
    `;
  }).join('');
}

// === Синк с сайтом (GitHub Actions) ===
let syncPollTimer = null;

async function runSync() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/sync.php?action=run`, {
      method: 'POST',
      headers: authHeaders(),
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      alert('Не удалось запустить синк:\n' + (data.error || 'HTTP ' + res.status));
      btn.disabled = false;
      return;
    }
    setSyncStatusText('Синк запущен, сайт обновится через ~3–5 минут…');
    // Следим за прогрессом, пока ран не завершится
    let polls = 0;
    clearInterval(syncPollTimer);
    syncPollTimer = setInterval(async () => {
      const done = await loadSyncStatus();
      if (done || ++polls > 20) {
        clearInterval(syncPollTimer);
        btn.disabled = false;
      }
    }, 20000);
  } catch (e) {
    alert('Ошибка запуска синка: ' + e.message);
    btn.disabled = false;
  }
}

function setSyncStatusText(html) {
  document.getElementById('syncStatus').innerHTML = html;
}

// Возвращает true, когда последний ран синка завершён
async function loadSyncStatus() {
  try {
    const res = await fetch(`${API_BASE}/sync.php?action=status`, { headers: authHeaders() });
    if (!res.ok) return true;
    const data = await res.json();
    const fmt = (run, label) => {
      if (!run) return `${label}: —`;
      const time = new Date(run.updated_at).toLocaleString('ru-RU');
      const state = run.status !== 'completed'
        ? '<span style="color:#ffc107">выполняется…</span>'
        : run.conclusion === 'success'
          ? '<span style="color:#4BD285">ок</span>'
          : `<span style="color:#dc3545">${esc(run.conclusion)}</span>`;
      return `${label}: <a href="${esc(run.html_url)}" target="_blank" rel="noopener noreferrer">${state}</a> (${time})`;
    };
    setSyncStatusText(`${fmt(data.sync, 'Синк')} &nbsp;·&nbsp; ${fmt(data.deploy, 'Деплой')}`);
    return !data.sync || data.sync.status === 'completed';
  } catch (e) {
    return true;
  }
}
